    tailwind.config = {

          }

  <!-- React & Framer Motion -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
  
  <!-- Custom Core Styles -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #030712;
      color: #f3f4f6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #030712;
    }

    ::-webkit-scrollbar-thumb {
      background: #1f2937;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }

    /* Glowing mesh effects for background */
    .glow-mesh {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .interactive-mesh {
      background: radial-gradient(circle, #f43f87 0%, rgba(139, 92, 246, 0.2) 100%);
    }

    .accent-mesh {
      background: radial-gradient(circle, #3b82f6 0%, rgba(16, 185, 129, 0.1) 100%);
    }

    /* Tech pattern overlay */
    .grid-overlay {
      background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center;
    }

    /* Standard admin styles port */
    :root {
      --bg: #080d1a;
      --surface: #0f1829;
      --card: #131e2e;
      --card2: #172236;
      --border: #1e2d45;
      --border2: #263654;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #94a3b8;
      --pink: #f43f87;
      --pink2: #fb7bb2;
      --blue: #3b82f6;
      --blue2: #60a5fa;
      --green: #10b981;
      --green2: #34d399;
      --purple: #8b5cf6;
      --purple2: #a78bfa;
      --gold: #f59e0b;
      --gold2: #fbbf24;
      --red: #ef4444;
      --red2: #f87171;
    }

    .admin-body {
      background-color: var(--bg);
      color: var(--text);
    }

    .app-shell {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      position: relative;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(244, 63, 135, .35);
    }

    .sidebar-logo .logo-icon svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
    }

    .sidebar-logo .logo-text {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--pink), var(--purple2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.3px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 8px 8px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted2);
      transition: all .18s ease;
      position: relative;
      user-select: none;
      border: 1px solid transparent;
    }

    .nav-item svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, .04);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(244, 63, 135, .1);
      color: var(--pink);
      border-color: rgba(244, 63, 135, .2);
    }

    .nav-item.active svg {
      stroke: var(--pink);
    }

    .nav-item .nav-dot {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 6px var(--pink);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .conn-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, .08);
      border: 1px solid rgba(16, 185, 129, .2);
      border-radius: 99px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--green2);
    }

    .conn-pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse-green 2s infinite;
    }

    .conn-pill.offline {
      background: rgba(239, 68, 68, .08);
      border-color: rgba(239, 68, 68, .2);
      color: var(--red2);
    }

    .conn-pill.offline .dot {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: none;
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 1;
    }

    .topbar {
      height: 64px;
      min-height: 64px;
      background: rgba(15, 24, 41, .85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
    }

    .topbar-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .topbar-title span {
      color: var(--muted2);
      font-weight: 400;
      font-size: 13px;
      margin-left: 8px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s;
    }

    .avatar:hover {
      border-color: var(--pink);
    }

    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: default;
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stat-icon svg {
      width: 22px;
      height: 22px;
    }

    .stat-body {
      flex: 1;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h3 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .card-body {
      padding: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .18s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn svg {
      width: 15px;
      height: 15px;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--pink);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #e0336f;
      box-shadow: 0 4px 16px rgba(244, 63, 135, .4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, .06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, .1);
    }

    .btn-blue {
      background: rgba(59, 130, 246, .15);
      color: var(--blue2);
      border: 1px solid rgba(59, 130, 246, .3);
    }

    .btn-blue:hover:not(:disabled) {
      background: rgba(59, 130, 246, .25);
    }

    .btn-green {
      background: rgba(16, 185, 129, .15);
      color: var(--green2);
      border: 1px solid rgba(16, 185, 129, .3);
    }

    .btn-green:hover:not(:disabled) {
      background: rgba(16, 185, 129, .25);
    }

    .btn-red {
      background: rgba(239, 68, 68, .12);
      color: var(--red2);
      border: 1px solid rgba(239, 68, 68, .25);
    }

    .btn-red:hover:not(:disabled) {
      background: rgba(239, 68, 68, .22);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 7px;
    }

    .btn-sm svg {
      width: 13px;
      height: 13px;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    .input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      transition: border-color .18s;
      outline: none;
    }

    .input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(244, 63, 135, .1);
    }

    .input::placeholder {
      color: var(--muted);
    }

    .input-code {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 140px;
      tab-size: 2;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
      margin-bottom: 6px;
      display: block;
      letter-spacing: .3px;
    }

    .field {
      margin-bottom: 16px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: rgba(255, 255, 255, .03);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(30, 45, 69, .6);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr {
      transition: background .15s;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, .025);
    }

    tbody tr.clickable {
      cursor: pointer;
    }

    tbody tr.clickable:hover {
      background: rgba(244, 63, 135, .06);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-pink {
      background: rgba(244, 63, 135, .15);
      color: var(--pink2);
      border: 1px solid rgba(244, 63, 135, .25);
    }

    .badge-blue {
      background: rgba(59, 130, 246, .12);
      color: var(--blue2);
      border: 1px solid rgba(59, 130, 246, .25);
    }

    .badge-green {
      background: rgba(16, 185, 129, .12);
      color: var(--green2);
      border: 1px solid rgba(16, 185, 129, .25);
    }

    .badge-purple {
      background: rgba(139, 92, 246, .12);
      color: var(--purple2);
      border: 1px solid rgba(139, 92, 246, .25);
    }

    .badge-gold {
      background: rgba(245, 158, 11, .12);
      color: var(--gold2);
      border: 1px solid rgba(245, 158, 11, .25);
    }

    .badge-gray {
      background: rgba(100, 116, 139, .12);
      color: var(--muted2);
      border: 1px solid rgba(100, 116, 139, .2);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 8px;
      gap: 12px;
    }

    .toggle-row-info {
      flex: 1;
    }

    .toggle-row-info .t-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .toggle-row-info .t-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 99px;
      cursor: pointer;
      transition: background .2s;
    }

    .toggle input:checked+.toggle-track {
      background: var(--pink);
    }

    .toggle input:checked+.toggle-track.gold {
      background: var(--gold);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      pointer-events: none;
    }

    .toggle input:checked~.toggle-thumb {
      transform: translateX(20px);
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 20px;
      gap: 12px;
      color: var(--muted);
    }

    .empty svg {
      width: 44px;
      height: 44px;
      stroke: var(--border2);
    }

    .empty p {
      font-size: 14px;
    }

    .empty small {
      font-size: 12px;
      color: var(--muted);
      opacity: .7;
    }

    .banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .banner svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .banner-error {
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .25);
      color: var(--red2);
    }

    .banner-success {
      background: rgba(16, 185, 129, .1);
      border: 1px solid rgba(16, 185, 129, .25);
      color: var(--green2);
    }

    .banner-info {
      background: rgba(59, 130, 246, .1);
      border: 1px solid rgba(59, 130, 246, .2);
      color: var(--blue2);
    }

    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(3px);
      z-index: 90;
    }

    .side-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 380px;
      background: var(--card);
      border-left: 1px solid var(--border2);
      z-index: 91;
      display: flex;
      flex-direction: column;
      box-shadow: -20px 0 60px rgba(0, 0, 0, .5);
    }

    .side-panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .side-panel-header h3 {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
    }

    .side-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .side-panel-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 16, 0.8);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
      z-index: 101;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-header h3 {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }

    .modal-body {
      padding: 20px;
      max-height: 70vh;

    .history-item {

    .history-item .h-time {

    .user-row.selected {

    }

    .user-avatar-sm {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .user-avatar-sm.admin {
      background: linear-gradient(135deg, var(--gold), var(--pink));

    .user-info {
      flex: 1;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
    }

    .user-badges {
      display: flex;
      gap: 5px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(244, 63, 135, .4);
    }

    .w-full {
      width: 100%;
    }

    .mb-3 {
      margin-bottom: 12px;
    }

    .mb-4 {
      margin-bottom: 16px;
    }

    .mt-3 {
      margin-top: 12px;
    }

    .mt-4 {
      margin-top: 16px;
    }

    .text-xs {
      font-size: 11px;
    }

      color: var(--muted);
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .null-val {

      font-style: italic;
    }

    .font-mono {
      font-family: 'Fira Code', monospace;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { AnimatePresence, motion } = window.Motion;

    // ── Local Mock DB Engine for Admin Dashboard ───────────────────────────────
    let mockDB = {
      tables: {
        'users': {
          columns: [{name: 'id', type: 'INT'}, {name: 'name', type: 'VARCHAR'}, {name: 'role', type: 'VARCHAR'}],
          rows: [
            [1, 'Alice Smith', 'Administrator'],
            [2, 'Bob Johnson', 'Developer'],
            [3, 'Carol Danvers', 'Operator']
          ]
        },
        'user_embeddings': {
          columns: [{name: 'user_id', type: 'INT'}, {name: 'embedding', type: 'VECTOR'}, {name: 'normalized', type: 'BOOLEAN'}],
          rows: [
            [1, [0.15, -0.92, 0.44], true],
            [2, [0.85, 0.12, -0.31], true],
            [3, [-0.05, 0.94, 0.31], false]
          ]
        },
        'research_runs': {
          columns: [{name: 'run_id', type: 'INT'}, {name: 'embedding', type: 'VECTOR'}, {name: 'spin', type: 'COMPLEX'}, {name: 'location', type: 'POINT'}],
          rows: [
            [101, [0.15, -0.92, 0.44], '2.5 - 4.0i', 'POINT(18.42 -33.92)'],
            [102, [0.85, 0.12, -0.31], '0.0 + 1.5i', 'POINT(0.05 0.10)']
          ]
        }
      },
      users: [
        { username: 'admin', is_admin: true, policy_name: 'Admin', policy: { can_select: true, can_insert: true, can_update: true, can_delete: true, can_create: true, can_drop: true } },
        { username: 'researcher', is_admin: false, policy_name: 'ReaderOnly', policy: { can_select: true, can_insert: false, can_update: false, can_delete: false, can_create: false, can_drop: false } }
      ],
      policies: [
        { name: 'ReaderOnly', can_select: true, can_insert: false, can_update: false, can_delete: false, can_create: false, can_drop: false },
        { name: 'AdminPolicy', can_select: true, can_insert: true, can_update: true, can_delete: true, can_create: true, can_drop: true }
      ]
    };

    function b64(str) {
      try { return btoa(unescape(encodeURIComponent(str))); } catch (e) { return btoa(str); }
    }

    function authHeader(creds) {
      return { 'Authorization': 'Basic ' + b64(creds.username + ':' + creds.password) };
    }

    // Interactive API layer simulating database interactions
    async function apiFetch(path, options, creds) {
      options = options || {};
      await new Promise(r => setTimeout(r, 450));

      if (path === '/api/tables') {
        return { ok: true, status: 200, data: { tables: Object.keys(mockDB.tables) } };
      }
      if (path.startsWith('/api/describe')) {
        const urlParams = new URLSearchParams(path.split('?')[1]);
        const table = urlParams.get('table');
        if (mockDB.tables[table]) {
          return { ok: true, status: 200, data: { columns: mockDB.tables[table].columns } };
        }
        return { ok: false, status: 404, data: { error: 'Table not found' } };
      }
      if (path === '/query') {
        const body = JSON.parse(options.body || '{}');
        const q = String(body.query || '').trim().toUpperCase();
        
        if (q.startsWith('SELECT * FROM')) {
          const words = q.split(' ');
          const tableName = words[3]?.replace(';', '').toLowerCase();
          const targetTable = mockDB.tables[tableName];
          if (targetTable) {
            return {
              ok: true,
              status: 200,
              data: {
                results: [{
                  columns: targetTable.columns.map(c => c.name),
                  rows: targetTable.rows
                }]
              }
            };
          }
        }
        if (q.startsWith('SHOW TABLES')) {
          return {
            ok: true,
            status: 200,
            data: {
              results: [{
                columns: ['table_name'],
                rows: Object.keys(mockDB.tables).map(name => [name])
              }]
            }
          };
        }
        
        return {
          ok: true,
          status: 200,
          data: {
            results: [{
              message: 'Query executed successfully. 1 row affected.'
            }]
          }
        };
      }
      if (path === '/api/users') {
        return { ok: true, status: 200, data: { users: mockDB.users } };
      }
      if (path === '/api/policies') {
        return { ok: true, status: 200, data: { policies: mockDB.policies } };
      }
      return { ok: false, status: 404, data: { error: 'Not found' } };
    }

    function fmt(v) {
      if (v === null || v === undefined) return React.createElement('span', { className: 'null-val' }, 'NULL');
      if (typeof v === 'object') return JSON.stringify(v);
      return String(v);
    }

    function typeColor(t) {
      if (!t) return 'gray';
      const u = String(t).toUpperCase();
      if (u.includes('INT')) return 'blue';
      if (u.includes('FLOAT') || u.includes('DOUBLE') || u.includes('REAL')) return 'purple';
      if (u.includes('VARCHAR') || u.includes('TEXT') || u.includes('CHAR')) return 'green';
      if (u.includes('VECTOR') || u.includes('MATRIX') || u.includes('TENSOR') || u.includes('COMPLEX')) return 'pink';
      return 'gray';
    }

    function TypeBadge({ type }) {
      const c = typeColor(type);
      return React.createElement('span', { className: `badge badge-${c}` }, type || 'UNKNOWN');
    }

    function ago(ts) {
      const d = Date.now() - ts;
      if (d < 60000) return Math.floor(d / 1000) + 's ago';
      if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
      return Math.floor(d / 3600000) + 'h ago';
    }

    // Lucide Icon parser
    function toPascal(str) {
      if (!str) return 'HelpCircle';
      return str.split('-').map(function (part) {
        return part.charAt(0).toUpperCase() + part.slice(1);
      }).join('');
    }

    function Icon({ name, size, stroke, style, className }) {
      size = size || 16;
      const ref = useRef(null);

      useEffect(() => {
        if (!ref.current || !window.lucide || !window.lucide.icons) return;
        ref.current.innerHTML = '';
        try {
          const pName = toPascal(name);
          const iconData = window.lucide.icons[pName]
            || window.lucide.icons[pName.replace('2', '')]
            || window.lucide.icons['CircleHelp']
            || window.lucide.icons['HelpCircle'];

          if (!iconData) return;

          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('width', String(size));
          svg.setAttribute('height', String(size));
          svg.setAttribute('viewBox', '0 0 24 24');
          svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke', stroke || 'currentColor');
          svg.setAttribute('stroke-width', '2');
          svg.setAttribute('stroke-linecap', 'round');
          svg.setAttribute('stroke-linejoin', 'round');

          let children = [];
          if (Array.isArray(iconData)) {
            if (Array.isArray(iconData[0])) {
              children = iconData;
            } else if (Array.isArray(iconData[2])) {
              children = iconData[2];
            }
          }

          children.forEach(function (child) {
            if (!Array.isArray(child)) return;
            const tag = child[0];
            const attrs = child[1] || {};
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);

            Object.entries(attrs).forEach(function (pair) {
              const attrName = pair[0].replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
              el.setAttribute(attrName, String(pair[1]));
            });

            svg.appendChild(el);
          });
          ref.current.appendChild(svg);
        } catch (e) {
          console.error('Icon error:', e);
        }
      }, [name, size, stroke]);

      return React.createElement('span', {
        ref,
        className,
        style: Object.assign({ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, verticalAlign: 'middle' }, style || {})
      });
    }

    function Toggle({ checked, onChange, gold }) {
      return React.createElement('label', { className: 'toggle' },
        React.createElement('input', { type: 'checkbox', checked: !!checked, onChange: function (e) { onChange(e.target.checked); } }),
        React.createElement('span', { className: 'toggle-track' + (gold ? ' gold' : '') }),
        React.createElement('span', { className: 'toggle-thumb' })
      );
    }

    function Banner({ type, children }) {
      type = type || 'error';
      const map = { error: ['banner-error', 'x-circle'], success: ['banner-success', 'check-circle'], info: ['banner-info', 'info'] };
      const pair = map[type] || map.error;
      return React.createElement('div', { className: 'banner ' + pair[0] },
        React.createElement(Icon, { name: pair[1], size: 16 }),
        React.createElement('span', null, children)
      );
    }

    function Spinner() { return React.createElement('span', { className: 'spinner' }); }

    function Empty({ icon, title, sub }) {
      icon = icon || 'inbox';
      return React.createElement('div', { className: 'empty' },
        React.createElement(Icon, { name: icon, size: 44 }),
        React.createElement('p', null, title),
        sub ? React.createElement('small', null, sub) : null
      );
    }

    function StatCard({ icon, label, value, sub, color }) {
      color = color || 'pink';
      const colorMap = {
        pink: { border: 'rgba(244,63,135,.2)', icon: 'rgba(244,63,135,.18)', stroke: 'var(--pink)' },
        blue: { border: 'rgba(59,130,246,.2)', icon: 'rgba(59,130,246,.18)', stroke: 'var(--blue2)' },
        green: { border: 'rgba(16,185,129,.2)', icon: 'rgba(16,185,129,.18)', stroke: 'var(--green2)' },
        purple: { border: 'rgba(139,92,246,.2)', icon: 'rgba(139,92,246,.18)', stroke: 'var(--purple2)' },
      };
      const c = colorMap[color] || colorMap.pink;
      return React.createElement(motion.div, {
        className: 'stat-card',
        style: { borderColor: c.border },
        whileHover: { y: -3, boxShadow: '0 8px 32px rgba(0,0,0,.45)' },
        transition: { type: 'spring', stiffness: 300, damping: 25 }
      },
        React.createElement('div', { className: 'stat-icon', style: { background: c.icon } },
          React.createElement(Icon, { name: icon, size: 22, stroke: c.stroke })
        ),
        React.createElement('div', { className: 'stat-body' },
          React.createElement('div', { className: 'stat-label' }, label),
          React.createElement('div', { className: 'stat-value', style: { color: c.stroke } }, value),
          sub ? React.createElement('div', { className: 'stat-sub' }, sub) : null
        )
      );
    }

    const LANDING_PLAYGROUND_PRESETS = [
      {
        title: "Vector Space Math (L2 Norm)",
        lang: "sql",
        code: "SELECT run_id, NORM(embedding), DOT(embedding, [1.0, 0.0, 0.0])\nFROM research_runs\nWHERE NORM(embedding) > 0.5;",
        type: "vector"
      },
      {
        title: "Geospatial Proximity",
        lang: "sql",
        code: "SELECT run_id, DISTANCE(location, POINT(0.0 0.0))\nFROM research_runs\nWHERE DISTANCE(location, POINT(0.0 0.0)) < 25.0;",
        type: "geospatial"
      },
      {
        title: "Complex Numbers & Matrices",
        lang: "sql",
        code: "INSERT INTO research_runs (run_id, embedding, spin, flux_matrix, location)\nVALUES (103, [0.15, -0.92, 0.44], 2.5 - 4.0i, [[1.0, 0.0], [0.0, 1.0]], POINT(18.42 -33.92));",
        type: "complex"
      }
    ];

    function ScientificPlayground() {
      const [selected, setSelected] = useState(0);
      const [editorVal, setEditorVal] = useState(LANDING_PLAYGROUND_PRESETS[0].code);
      const [isExecuting, setIsExecuting] = useState(false);
      const [consoleOutput, setConsoleOutput] = useState([
        "flamingo> // Welcome to the FlamingoDB scientific interface.",
        "flamingo> // Choose a preset query and select 'Run Statement' to query."
      ]);
      const [canvasMode, setCanvasMode] = useState("vector");

      const handleRun = () => {
        setIsExecuting(true);
        const preset = LANDING_PLAYGROUND_PRESETS[selected];
        setCanvasMode(preset.type);
        setConsoleOutput(prev => [...prev, `flamingo> Executing AST Query: ${preset.title}...`]);

        setTimeout(() => {
          setIsExecuting(false);
          if (preset.type === "vector") {
            setConsoleOutput(prev => [
              ...prev,
              "--- Scientific Query Executed (Took: 140μs) ---",
              "| run_id | NORM(embedding) | DOT(embedding, [1,0,0]) |",
              "+--------+-----------------+-------------------------+",
              "| 101    | 1.0296          | 0.1500                  |",
              "| 102    | 0.9135          | 0.8500                  |",
              "(2 rows returned)"
            ]);
          } else if (preset.type === "geospatial") {
            setConsoleOutput(prev => [
              ...prev,
              "--- Geospatial Distance Resolved ---",
              "| run_id | DISTANCE(location, origin) |",
              "+--------+----------------------------+",
              "| 102    | 0.1118                     |",
              "(1 row matched target threshold of < 25.0)"
            ]);
          } else {
            setConsoleOutput(prev => [
              ...prev,
              "table \"research_runs\" record inserted successfully.",
              "  ✓ Complex Spin: 2.5 - 4.0i parsed as struct{Real, Imag}",
              "  ✓ Matrix flux_matrix: [2x2] stored natively as floating flat points",
              "1 row(s) affected."
            ]);
          }
        }, 500);
      };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch">
          {/* Code Interface */}
          <div className="lg:col-span-7 flex flex-col justify-between rounded-2xl border border-gray-800 bg-gray-950/80 overflow-hidden shadow-2xl">
            <div className="p-4 border-b border-gray-800/85 bg-gray-900/40 flex items-center justify-between">
              <div className="flex gap-2">
                <span className="w-3 h-3 rounded-full bg-red-500/70"></span>
                <span className="w-3 h-3 rounded-full bg-yellow-500/70"></span>
                <span className="w-3 h-3 rounded-full bg-green-500/70"></span>
              </div>
              <span className="text-xs text-gray-400 font-mono">research_query.sql</span>
              <button
                onClick={handleRun}
                disabled={isExecuting}
                className="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-pink-500 hover:bg-pink-600 disabled:bg-gray-800 text-white text-xs font-semibold transition"
              >
                {isExecuting ? <Spinner /> : <Icon name="play" size={12} />}
                Run Statement
              </button>
            </div>

            {/* Tab Selection */}
            <div className="flex border-b border-gray-800 bg-gray-950">
              {LANDING_PLAYGROUND_PRESETS.map((item, idx) => (
                <button
                  key={idx}
                  onClick={() => { setSelected(idx); setEditorVal(item.code); }}
                  className={`px-4 py-3 text-xs font-medium border-r border-gray-800 transition ${selected === idx ? 'bg-gray-900/60 text-pink-400 border-b-2 border-b-pink-500' : 'text-gray-400 hover:text-gray-200'}`}
                >
                  {item.title}
                </button>
              ))}
            </div>

            {/* SQL Terminal Area */}
            <div className="flex-1 min-h-[160px] p-4 bg-gray-950/30">
              <textarea
                value={editorVal}
                onChange={(e) => setEditorVal(e.target.value)}
                className="w-full h-full bg-transparent border-none outline-none font-mono text-xs text-pink-300 leading-relaxed resize-none focus:ring-0"
                spellCheck="false"
              />
            </div>

            {/* Interactive Console Log Output */}
            <div className="border-t border-gray-800 bg-gray-950 p-4 font-mono text-[11px] text-gray-300 min-h-[140px] max-h-[180px] overflow-y-auto">
              {consoleOutput.map((item, idx) => (
                <div key={idx} className="whitespace-pre">{item}</div>
              ))}
            </div>
          </div>

          {/* Interactive Scientific Node Visualizer */}
          <div className="lg:col-span-5 rounded-2xl border border-gray-800 bg-gray-900/20 backdrop-blur p-6 flex flex-col justify-between shadow-xl">
            <div>
              <h4 className="text-sm font-bold text-gray-100 flex items-center gap-2 mb-1">
                <Icon name="activity" size={16} stroke="#f43f87" />
                Multidimensional Memory Map
