<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlamingoDB Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.js"></script>
  
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080d1a;
      --surface: #0f1829;
      --card: #131e2e;
      --card2: #172236;
      --border: #1e2d45;
      --border2: #263654;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #94a3b8;
      --pink: #f43f87;
      --pink2: #fb7bb2;
      --blue: #3b82f6;
      --blue2: #60a5fa;
      --green: #10b981;
      --green2: #34d399;
      --purple: #8b5cf6;
      --purple2: #a78bfa;
      --gold: #f59e0b;
      --gold2: #fbbf24;
      --red: #ef4444;
      --red2: #f87171;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    .app-shell {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    .app-shell::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% -10%, rgba(244, 63, 135, .12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 110%, rgba(59, 130, 246, .10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      position: relative;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(244, 63, 135, .35);
    }

    .sidebar-logo .logo-icon svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
    }

    .sidebar-logo .logo-text {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--pink), var(--purple2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.3px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 8px 8px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted2);
      transition: all .18s ease;
      position: relative;
      user-select: none;
      border: 1px solid transparent;
    }

    .nav-item svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, .04);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(244, 63, 135, .1);
      color: var(--pink);
      border-color: rgba(244, 63, 135, .2);
    }

    .nav-item.active svg {
      stroke: var(--pink);
    }

    .nav-item .nav-dot {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 6px var(--pink);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .conn-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, .08);
      border: 1px solid rgba(16, 185, 129, .2);
      border-radius: 99px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--green2);
    }

    .conn-pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse-green 2s infinite;
    }

    .conn-pill.offline {
      background: rgba(239, 68, 68, .08);
      border-color: rgba(239, 68, 68, .2);
      color: var(--red2);
    }

    .conn-pill.offline .dot {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: none;
    }

    @keyframes pulse-green {
      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 8px var(--green);
      }

      50% {
        opacity: .6;
        box-shadow: 0 0 3px var(--green);
      }
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 1;
    }

    .topbar {
      height: 64px;
      min-height: 64px;
      background: rgba(15, 24, 41, .85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
    }

    .topbar-title {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .topbar-title span {
      color: var(--muted2);
      font-weight: 400;
      font-size: 13px;
      margin-left: 8px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s;
    }

    .avatar:hover {
      border-color: var(--pink);
    }

    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: default;
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stat-icon svg {
      width: 22px;
      height: 22px;
    }

    .stat-body {
      flex: 1;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h3 {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
    }

    .card-body {
      padding: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .18s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn svg {
      width: 15px;
      height: 15px;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--pink);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #e0336f;
      box-shadow: 0 4px 16px rgba(244, 63, 135, .4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, .06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, .1);
    }

    .btn-blue {
      background: rgba(59, 130, 246, .15);
      color: var(--blue2);
      border: 1px solid rgba(59, 130, 246, .3);
    }

    .btn-blue:hover:not(:disabled) {
      background: rgba(59, 130, 246, .25);
    }

    .btn-green {
      background: rgba(16, 185, 129, .15);
      color: var(--green2);
      border: 1px solid rgba(16, 185, 129, .3);
    }

    .btn-green:hover:not(:disabled) {
      background: rgba(16, 185, 129, .25);
    }

    .btn-red {
      background: rgba(239, 68, 68, .12);
      color: var(--red2);
      border: 1px solid rgba(239, 68, 68, .25);
    }

    .btn-red:hover:not(:disabled) {
      background: rgba(239, 68, 68, .22);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 7px;
    }

    .btn-sm svg {
      width: 13px;
      height: 13px;
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    .input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      transition: border-color .18s;
      outline: none;
    }

    .input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(244, 63, 135, .1);
    }

    .input::placeholder {
      color: var(--muted);
    }

    .input-code {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
      min-height: 140px;
      tab-size: 2;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted2);
      margin-bottom: 6px;
      display: block;
      letter-spacing: .3px;
    }

    .field {
      margin-bottom: 16px;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: rgba(255, 255, 255, .03);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .6px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(30, 45, 69, .6);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr {
      transition: background .15s;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, .025);
    }

    tbody tr.clickable {
      cursor: pointer;
    }

    tbody tr.clickable:hover {
      background: rgba(244, 63, 135, .06);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-pink {
      background: rgba(244, 63, 135, .15);
      color: var(--pink2);
      border: 1px solid rgba(244, 63, 135, .25);
    }

    .badge-blue {
      background: rgba(59, 130, 246, .12);
      color: var(--blue2);
      border: 1px solid rgba(59, 130, 246, .25);
    }

    .badge-green {
      background: rgba(16, 185, 129, .12);
      color: var(--green2);
      border: 1px solid rgba(16, 185, 129, .25);
    }

    .badge-purple {
      background: rgba(139, 92, 246, .12);
      color: var(--purple2);
      border: 1px solid rgba(139, 92, 246, .25);
    }

    .badge-gold {
      background: rgba(245, 158, 11, .12);
      color: var(--gold2);
      border: 1px solid rgba(245, 158, 11, .25);
    }

    .badge-gray {
      background: rgba(100, 116, 139, .12);
      color: var(--muted2);
      border: 1px solid rgba(100, 116, 139, .2);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 8px;
      gap: 12px;
    }

    .toggle-row-info {
      flex: 1;
    }

    .toggle-row-info .t-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .toggle-row-info .t-desc {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 99px;
      cursor: pointer;
      transition: background .2s;
    }

    .toggle input:checked+.toggle-track {
      background: var(--pink);
    }

    .toggle input:checked+.toggle-track.gold {
      background: var(--gold);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      pointer-events: none;
    }

    .toggle input:checked~.toggle-thumb {
      transform: translateX(20px);
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 52px 20px;
      gap: 12px;
      color: var(--muted);
    }

    .empty svg {
      width: 44px;
      height: 44px;
      stroke: var(--border2);
    }

    .empty p {
      font-size: 14px;
    }

    .empty small {
      font-size: 12px;
      color: var(--muted);
      opacity: .7;
    }

    .banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .banner svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .banner-error {
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .25);
      color: var(--red2);
    }

    .banner-success {
      background: rgba(16, 185, 129, .1);
      border: 1px solid rgba(16, 185, 129, .25);
      color: var(--green2);
    }

    .banner-info {
      background: rgba(59, 130, 246, .1);
      border: 1px solid rgba(59, 130, 246, .2);
      color: var(--blue2);
    }

    .panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(3px);
      z-index: 90;
    }

    .side-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 380px;
      background: var(--card);
      border-left: 1px solid var(--border2);
      z-index: 91;
      display: flex;
      flex-direction: column;
      box-shadow: -20px 0 60px rgba(0, 0, 0, .5);
    }

    .side-panel-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .side-panel-header h3 {
      flex: 1;
      font-size: 16px;
      font-weight: 700;
    }

    .side-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .side-panel-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 16, 0.8);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
      z-index: 101;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-header h3 {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }

    .modal-body {
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      background: rgba(255, 255, 255, 0.01);
    }

    .login-bg {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      position: relative;
    }

    .login-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 70% at 20% 20%, rgba(244, 63, 135, .18) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 80% 80%, rgba(59, 130, 246, .14) 0%, transparent 55%);
      pointer-events: none;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
      box-shadow: 0 30px 70px rgba(0, 0, 0, .6);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
      justify-content: center;
    }

    .login-logo .icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(244, 63, 135, .5);
    }

    .login-logo .icon svg {
      width: 28px;
      height: 28px;
      stroke: #fff;
    }

    .login-logo .text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--pink), var(--purple2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-sub {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;

              React.createElement(Banner, { type: 'error' }, error)

                          React.createElement('div', { className: 'card-header' },
                            React.createElement(Icon, { name: 'table', size: 15, stroke: 'var(--blue2)' }),

                            React.createElement('span', { className: 'badge badge-blue' }, res.rows.length + ' row' + (res.rows.length !== 1 ? 's' : '')),

                        fontSize: '12px',
                        color: 'var(--text)'
                      }
                    }, parseInlineMarkdown(cell.trim())))
                  ))
                )
              )
            )
          );
          currentTable = null;
        }
      };

      for (let idx = 0; idx < lines.length; idx++) {
        const line = lines[idx];
        const trimmed = line.trim();

        // Detect Markdown Table Line (starts/ends with | or contains |)
        if (trimmed.startsWith('|') && trimmed.endsWith('|') && trimmed.length > 2) {
          flushList();
          const cells = trimmed.split('|').map(s => s.trim()).filter((_, i, a) => i > 0 && i < a.length - 1);
          
          if (cells.every(c => c.match(/^[-:]+$/))) {
            // It's the divider row e.g. |---|---|
            continue;
          }

          if (!currentTable) {
            currentTable = { headers: cells, rows: [] };
          } else {
            currentTable.rows.push(cells);
          }
          continue;
        } else {
          flushTable();
        }

        // Detect Bullet Lists
        if (trimmed.startsWith('* ') || trimmed.startsWith('- ')) {
          const content = trimmed.slice(2);
          const liElement = React.createElement('li', {
            key: 'li-' + (currentList ? currentList.length : 0),
            style: { margin: '4px 0', color: 'var(--text)' }
          }, parseInlineMarkdown(content));

          if (!currentList) {
            currentList = [liElement];
          } else {
            currentList.push(liElement);
          }
          continue;
        } else {
          flushList();
        }

        // Skip Empty Lines
        if (!trimmed) {
          continue;
        }

        // Fallback: Regular paragraph block
        blocks.push(React.createElement('p', {
          key: 'p-' + idx,
          style: { margin: '8px 0', color: 'var(--text)', lineHeight: '1.6' }
        }, parseInlineMarkdown(line)));
      }

      flushList();
      flushTable();

      return React.createElement('div', { key: keyPrefix }, blocks);
    }

            loading ? ' Connecting…' : ' Connect'
          ),
          React.createElement('div', { style: { marginTop: 20, textAlign: 'center', fontSize: 11, color: 'var(--muted)' } }, 'Secure connection via HTTP Basic Auth')
        )
      );
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // App Shell
    // ─────────────────────────────────────────────────────────────────────────────
    const PAGES = [
      { id: 'console', label: 'SQL Console', icon: 'terminal' },
      { id: 'tables', label: 'Table Browser', icon: 'database' },
      { id: 'ai', label: 'AI Assistant', icon: 'cpu' },
      { id: 'users', label: 'Users', icon: 'users' },
      { id: 'settings', label: 'Settings', icon: 'settings' },
      { id: 'profile', label: 'My Profile', icon: 'user' },
    ];

    function App() {
      const [creds, setCreds] = useState(null);
      const [page, setPage] = useState('console');
      const [stats, setStats] = useState({ tables: 0, queries: 0, users: 0 });
      const [online, setOnline] = useState(true);

      useEffect(function () {
        try {
          const saved = sessionStorage.getItem('flamingo_creds');
          if (saved) setCreds(JSON.parse(saved));
        } catch (e) { }
      }, []);

      const handleLogin = function (c, tables) {
        setCreds(c);
        setStats(function (s) { return Object.assign({}, s, { tables: tables.length }); });
        sessionStorage.setItem('flamingo_creds', JSON.stringify(c));
        apiFetch('/api/users', {}, c).then(function (r) { if (r.ok && r.data.users) setStats(function (s) { return Object.assign({}, s, { users: r.data.users.length }); }); });
      };

      const logout = function () {
        setCreds(null);
        sessionStorage.removeItem('flamingo_creds');
      };

      useEffect(function () {
        if (!creds) return;
        const check = function () {
          apiFetch('/api/tables', {}, creds).then(function (r) { setOnline(r.ok); }).catch(function () { setOnline(false); });
        };
        check();
        const iv = setInterval(check, 30000);
        return function () { clearInterval(iv); };
      }, [creds]);

      useEffect(function () {
        if (!creds) return;
        apiFetch('/api/tables', {}, creds).then(function (r) { if (r.ok && r.data.tables) setStats(function (s) { return Object.assign({}, s, { tables: r.data.tables.length }); }); });
        apiFetch('/api/users', {}, creds).then(function (r) { if (r.ok && r.data.users) setStats(function (s) { return Object.assign({}, s, { users: r.data.users.length }); }); });
      }, [page, creds]);

      if (!creds) {
        return React.createElement(LoginPage, { onLogin: handleLogin });
      }

      const currentPage = PAGES.find(function (p) { return p.id === page; }) || PAGES[0];

      return React.createElement('div', { className: 'app-shell' },
        React.createElement('nav', { className: 'sidebar' },
          React.createElement('div', { className: 'sidebar-logo' },
            React.createElement('div', { className: 'logo-icon' }, React.createElement(Icon, { name: 'database-zap', size: 20 })),
            React.createElement('span', { className: 'logo-text' }, 'FlamingoDB')
          ),
          React.createElement('div', { className: 'sidebar-nav' },
            React.createElement('div', { className: 'nav-label' }, 'Navigation'),
            PAGES.map(function (p) {
              return React.createElement(motion.div, {
                key: p.id,
                className: 'nav-item' + (page === p.id ? ' active' : ''),
                onClick: function () { setPage(p.id); },
                whileHover: { x: 2 },
                transition: { type: 'spring', stiffness: 400, damping: 30 }
              },
                React.createElement(Icon, { name: p.icon, size: 17 }),
                p.label,
                page === p.id ? React.createElement('span', { className: 'nav-dot' }) : null
              );
            })
          ),
          React.createElement('div', { className: 'sidebar-footer' },
            React.createElement('div', { className: 'conn-pill' + (online ? '' : ' offline'), style: { marginBottom: 8 } },
              React.createElement('span', { className: 'dot' }),
              React.createElement('span', { style: { flex: 1 } }, online ? 'Connected' : 'Offline')
            ),
            React.createElement('div', {
              className: 'nav-item',
              onClick: logout,
              style: { margin: '4px 0 0 0' }
            },
              React.createElement(Icon, { name: 'log-out', size: 16 }),
              'Disconnect'
            ),
            React.createElement('div', { style: { marginTop: 12, fontSize: 11, color: 'var(--muted)', textAlign: 'center' } },
              'Signed in as ',
              React.createElement('span', { style: { color: 'var(--text)', fontWeight: 600 } }, creds.username)
            )
          )
        ),
        React.createElement('div', { className: 'main-area' },
          React.createElement('header', { className: 'topbar' },
            React.createElement('div', { className: 'topbar-title' },
              currentPage.label,
              React.createElement('span', null, '/ FlamingoDB')
            ),
            React.createElement('div', { className: 'topbar-actions' },
              React.createElement('span', { className: 'badge badge-green', style: { fontSize: 11 } },
                React.createElement('span', { style: { width: 6, height: 6, borderRadius: '50%', background: 'var(--green)', display: 'inline-block', marginRight: 3 } }),
                stats.tables + ' table' + (stats.tables !== 1 ? 's' : '')
              ),
              React.createElement('div', { className: 'avatar', onClick: function () { setPage('profile'); }, title: 'Profile: ' + creds.username }, creds.username[0].toUpperCase())
            )
          ),
          React.createElement('div', { className: 'page-content' },
            React.createElement(AnimatePresence, { mode: 'wait' },
              page === 'console' ? React.createElement(SqlConsolePage, { key: 'console', creds: creds, stats: stats, setStats: setStats }) :
                page === 'tables' ? React.createElement(TableBrowserPage, { key: 'tables', creds: creds }) :
                  page === 'users' ? React.createElement(UsersPage, { key: 'users', creds: creds }) :
                    page === 'settings' ? React.createElement(SettingsPage, { key: 'settings', creds: creds }) :
                      page === 'profile' ? React.createElement(ProfilePage, { key: 'profile', creds: creds, setCreds: setCreds }) :
                        page === 'ai' ? React.createElement(AIAssistantPage, { key: 'ai', creds: creds }) :
                          null
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>

</html>
